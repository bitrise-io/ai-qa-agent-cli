name: release

# Build cross-platform binaries and attach them to the GitHub release
# whenever a vX.Y.Z tag is pushed.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # required to create/update the release and upload assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        env:
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p dist
          targets=(
            "darwin/arm64"
            "darwin/amd64"
            "linux/amd64"
            "linux/arm64"
          )
          for target in "${targets[@]}"; do
            GOOS="${target%/*}"
            GOARCH="${target#*/}"
            name="ai-qa-agent-cli_${VERSION}_${GOOS}_${GOARCH}"
            echo "building ${name}"
            GOOS="$GOOS" GOARCH="$GOARCH" \
              go build -trimpath -ldflags="-s -w" -o "dist/ai-qa-agent-cli" .
            tar -czf "dist/${name}.tar.gz" -C dist ai-qa-agent-cli
            rm dist/ai-qa-agent-cli
          done
          cd dist
          sha256sum *.tar.gz > SHA256SUMS
          ls -la

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS
          fail_on_unmatched_files: true
